<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-translate-key="mainTitle">DarkEmoji</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/index.css">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <script>
        // 立即设置主题，避免闪烁
        document.documentElement.setAttribute('data-theme',
            localStorage.getItem('theme') === 'light' ? 'light' : 'dark' // Default to dark if not 'light'
        );
    </script>
</head>
<body>
    <div class="top-bar">
        <h1 class="title" data-translate-key="mainTitle">DarkEmoji</h1>
        <div class="controls">
            <!-- Language Selector -->
            <div class="language-selector">
                <a href="#" id="languageLink" class="language-link">🌐 EN</a>
                <div id="languageDropdown" class="language-dropdown">
                    <a href="#" class="language-option" data-lang="en">English</a>
                    <a href="#" class="language-option" data-lang="zh-Hans">简体中文</a>
                    <a href="#" class="language-option" data-lang="zh-Hant">繁體中文</a>
                    <!-- Add more languages here -->
                </div>
            </div>
            <!-- Cipher Selector -->
            <div class="subtitle-container">
                <span id="cipherSubtitle">AES-256-GCM & Base64</span>
                <div id="cipherMenu" class="dropdown-menu">
                    <div class="menu-section mode-selection">
                        <button id="defaultBtn" class="mode-btn-menu active" data-translate-key="defaultBtnText">Default</button>
                        <button id="customBtn" class="mode-btn-menu" data-translate-key="customBtnText">Custom</button>
                    </div>
                    <div class="menu-section options">
                        <div id="optionCipher" class="option-group">
                            <button class="mode-btn-menu active" data-value="AES-256-GCM">AES-256-GCM</button>
                            <button class="mode-btn-menu" data-value="ChaCha20-Poly1305">ChaCha20-Poly1305</button>
                        </div>
                        <div id="optionBase" class="option-group">
                            <button class="mode-btn-menu active" data-value="Base64">Base64</button>
                            <button class="mode-btn-menu" data-value="Base128">Base128</button>
                            <button class="mode-btn-menu" data-value="Base256">Base256</button>
                            <button class="mode-btn-menu" data-value="Base512">Base512</button>
                            <button class="mode-btn-menu" data-value="Base1024">Base1024</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="mode-switch">
            <button id="encryptBtn" class="mode-btn active">
                <span>🔒</span>
            </button>
            <button id="decryptBtn" class="mode-btn">
                <span>🔓</span>
            </button>
        </div>

        <div class="input-section">
            <textarea id="inputText" placeholder="Input" data-translate-key="inputPlaceholderEncrypt"></textarea>
            <div class="button-group">
                <button class="action-btn" id="inputExpand">
                    <span class="btn-text default" data-translate-key="expandBtnText">Expand</span>
                    <span class="btn-text success" data-translate-key="collapseBtnText">Collapse</span>
                </button>
                <button class="action-btn" id="inputPaste">
                    <span class="btn-text default paste-text" data-translate-key="pasteBtnText">Paste</span>
                    <span class="btn-text default copy-text" style="opacity: 0; pointer-events: none;" data-translate-key="copyBtnText">Copy</span>
                    <span class="btn-text success pasted-text" style="opacity: 0; pointer-events: none;" data-translate-key="pastedBtnText">Pasted</span>
                    <span class="btn-text success copied-text" style="opacity: 0; pointer-events: none;" data-translate-key="copiedBtnText">Copied</span>
                </button>
                <button class="action-btn" id="inputClear">
                    <span class="btn-text default" data-translate-key="clearBtnText">Clear</span>
                    <span class="btn-text success" data-translate-key="clearedBtnText">Cleared</span>
                    <span class="btn-text query" data-translate-key="emptyBtnText">Empty</span>
                </button>
                <div class="file-drop-area" id="fileDropArea">
                    <span class="file-msg" data-translate-key="selectOrDropText">Select or Drop</span>
                    <input type="file" id="fileInput" class="file-input">
                </div>
            </div>
        </div>

        <div class="password-section">
            <form id="passwordForm" autocomplete="on" target="hiddenFrame" action="?">
                <input type="password" id="password" name="password" placeholder="Password (optional)" autocomplete="current-password" data-translate-key="passwordPlaceholder">
                <input type="submit" style="display: none;">
            </form>
            <div class="button-group">
                <button class="action-btn" id="passwordCopy">
                    <span class="btn-text default empty-text" data-translate-key="emptyBtnText">Empty</span>
                    <span class="btn-text default show-text" style="opacity: 0; pointer-events: none;" data-translate-key="showBtnText">Show</span>
                    <span class="btn-text default hide-text" style="opacity: 0; pointer-events: none;" data-translate-key="hideBtnText">Hide</span>
                </button>
                <button class="action-btn" id="passwordPaste">
                    <span class="btn-text default paste-text" data-translate-key="pasteBtnText">Paste</span>
                    <span class="btn-text default copy-text" style="opacity: 0; pointer-events: none;" data-translate-key="copyBtnText">Copy</span>
                    <span class="btn-text success pasted-text" style="opacity: 0; pointer-events: none;" data-translate-key="pastedBtnText">Pasted</span>
                    <span class="btn-text success copied-text" style="opacity: 0; pointer-events: none;" data-translate-key="copiedBtnText">Copied</span>
                </button>
                <button class="action-btn" id="passwordClear">
                    <span class="btn-text default" data-translate-key="clearBtnText">Clear</span>
                    <span class="btn-text success" data-translate-key="clearedBtnText">Cleared</span>
                    <span class="btn-text query" data-translate-key="emptyBtnText">Empty</span>
                </button>
                <button class="action-btn" id="passwordGenerate">
                    <span class="btn-text default" data-translate-key="generateBtnText">Generate</span>
                    <span class="btn-text success" data-translate-key="generatedBtnText">Generated</span>
                    <span class="btn-text query" style="opacity: 0; pointer-events: none;" data-translate-key="emptyBtnText">Empty</span>
                </button>
            </div>
        </div>

        <div class="output-section">
            <textarea id="outputText" placeholder="Output" readonly data-translate-key="outputPlaceholderEncrypt"></textarea>
            <div class="button-group">
                <button class="action-btn" id="outputExpand">
                    <span class="btn-text default" data-translate-key="expandBtnText">Expand</span>
                    <span class="btn-text success" data-translate-key="collapseBtnText">Collapse</span>
                </button>
                <button class="action-btn" id="outputCopy">
                    <span class="btn-text default" data-translate-key="copyBtnText">Copy</span>
                    <span class="btn-text success" data-translate-key="copiedBtnText">Copied</span>
                    <span class="btn-text query" style="opacity: 0; pointer-events: none;" data-translate-key="emptyBtnText">Empty</span>
                </button>
                <button class="action-btn" id="outputClear">
                    <span class="btn-text default" data-translate-key="clearBtnText">Clear</span>
                    <span class="btn-text success" data-translate-key="clearedBtnText">Cleared</span>
                    <span class="btn-text query" data-translate-key="emptyBtnText">Empty</span>
                </button>
                <div class="file-drop-area" id="downloadFileArea">
                    <span class="file-msg" data-translate-key="downloadText">Download</span>
                    <input type="file" id="saveFileInput" class="file-input" style="display: none;">
                </div>
            </div>
        </div>

        <button id="actionBtn" class="main-btn"><span>🔒</span></button>
    </div>

    <footer>
        <a href="https://github.com/iterami/DarkEmoji/blob/main/README.md" target="_blank" data-translate-key="aboutLinkText">About</a> |
        <a href="https://github.com/iterami/DarkEmoji" target="_blank" data-translate-key="githubLinkText">GitHub</a>
    </footer>

    <!-- Hidden iframe for password form submission -->
    <iframe name="hiddenFrame" id="hiddenFrame" style="display: none;"></iframe>

    <script src="js/language.js"></script>
    <script src="js/cipher.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
