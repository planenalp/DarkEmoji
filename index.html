    <script>
        // 立即设置主题，避免闪烁
        document.documentElement.setAttribute('data-theme',
            localStorage.getItem('theme') === 'light' ? 'light' : 'dark' // Default to dark if not 'light'
        );
    </script>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <div class="title-container">
        <h1 class="title">DarkEmoji</h1>
    </div>
    <div class="subtitle-container">
        <h2 class="subtitle" id="cipherSubtitle">AES-256-GCM & Base64</h2>
        <div class="dropdown-menu" id="cipherMenu">
            <div class="menu-mode-switch" id="defaultCustomSwitch">
                <button id="defaultBtn" class="mode-btn mode-btn-menu active" data-encrypt="AES-256-GCM" data-encode="Base64">
                    <span>Default</span>
                </button>
                <button id="customBtn" class="mode-btn mode-btn-menu">
                    <span>Custom</span>
                </button>
            </div>
            <div class="menu-mode-switch" id="optionCipher">
                <button class="mode-btn mode-btn-menu active" data-value="AES-256-GCM"><span>AES-256-GCM</span></button>
                <button class="mode-btn mode-btn-menu" data-value="ChaCha20-Poly1305"><span>ChaCha20-Poly1305</span></button>
            </div>
            <div class="menu-mode-switch" id="optionBase">
                <button class="mode-btn mode-btn-menu active" data-value="Base64"><span>Base64</span></button>
                <button class="mode-btn mode-btn-menu" data-value="Base128"><span>Base128</span></button>
                <button class="mode-btn mode-btn-menu" data-value="Base256"><span>Base256</span></button>
                <button class="mode-btn mode-btn-menu" data-value="Base512"><span>Base512</span></button>
                <button class="mode-btn mode-btn-menu" data-value="Base1024"><span>Base1024</span></button>
            </div>
        </div>
    </div>
    <div class="container">
        <div class="mode-switch">
            <button id="encryptBtn" class="mode-btn active">
                <span>🔒</span>
            </button>
            <button id="decryptBtn" class="mode-btn">
                <span>🔓</span>
            </button>
        </div>

        <div class="input-section">
            <textarea id="inputText" placeholder="Input"></textarea>
            <div class="button-group">
                <button class="action-btn" id="inputExpand">
                    <span class="btn-text default">Expand</span>
                    <span class="btn-text success">Collapse</span>
                </button>
                <button class="action-btn" id="inputPaste">
                    <span class="btn-text default paste-text">Paste</span>
                    <span class="btn-text default copy-text" style="opacity: 0; pointer-events: none;">Copy</span>
                    <span class="btn-text success pasted-text" style="opacity: 0; pointer-events: none;">Pasted</span>
                    <span class="btn-text success copied-text" style="opacity: 0; pointer-events: none;">Copied</span>
                </button>
                <button class="action-btn" id="inputClear">
                    <span class="btn-text default">Clear</span>
                    <span class="btn-text success">Cleared</span>
                    <span class="btn-text query">Empty</span>
                </button>
                <div class="file-drop-area" id="fileDropArea">
                    <span class="file-msg">Select or Drop</span>
                    <input type="file" id="fileInput" class="file-input">
                </div>
            </div>
        </div>

        <div class="password-section">
            <form id="passwordForm" autocomplete="on">
                <input type="password" id="password" name="password" placeholder="Password (optional)" autocomplete="current-password">
                <input type="submit" style="display: none;">
            </form>
            <div class="button-group">
                <button class="action-btn" id="passwordCopy">
                    <span class="btn-text default empty-text">Empty</span>
                    <span class="btn-text default show-text" style="opacity: 0; pointer-events: none;">Show</span>
                    <span class="btn-text default hide-text" style="opacity: 0; pointer-events: none;">Hide</span>
                </button>
                <button class="action-btn" id="passwordPaste">
                    <span class="btn-text default paste-text">Paste</span>
                    <span class="btn-text default copy-text" style="opacity: 0; pointer-events: none;">Copy</span>
                    <span class="btn-text success pasted-text" style="opacity: 0; pointer-events: none;">Pasted</span>
                    <span class="btn-text success copied-text" style="opacity: 0; pointer-events: none;">Copied</span>
                </button>
                <button class="action-btn" id="passwordClear">
                    <span class="btn-text default">Clear</span>
                    <span class="btn-text success">Cleared</span>
                    <span class="btn-text query">Empty</span>
                </button>
                <button class="action-btn" id="passwordGenerate">
                    <span class="btn-text default">Generate</span>
                    <span class="btn-text success">Generated</span>
                    <span class="btn-text query" style="opacity: 0; pointer-events: none;">Empty</span>
                </button>
            </div>
        </div>

        <div class="output-section">
            <textarea id="outputText" placeholder="Output" readonly></textarea>
            <div class="button-group">
                <button class="action-btn" id="outputExpand">
                    <span class="btn-text default">Expand</span>
                    <span class="btn-text success">Collapse</span>
                </button>
                <button class="action-btn" id="outputCopy">
                    <span class="btn-text default">Copy</span>
                    <span class="btn-text success">Copied</span>
                    <span class="btn-text query" style="opacity: 0; pointer-events: none;">Empty</span>
                </button>
                <button class="action-btn" id="outputClear">
                    <span class="btn-text default">Clear</span>
                    <span class="btn-text success">Cleared</span>
                    <span class="btn-text query">Empty</span>
                </button>
                <div class="file-drop-area" id="saveFileArea">
                    <span class="file-msg">Save as...</span>
                    <input type="file" id="saveFileInput" class="file-input" style="display: none;">
                </div>
            </div>
        </div>

        <button id="actionBtn" class="main-btn"><span>🔒</span></button>
    </div>

    <footer class="footer">
        <a href="https://github.com/planenalp/DarkEmoji/blob/main/README.md">About</a>
        <a href="https://github.com/planenalp/DarkEmoji">GitHub</a>
        <a href="#">Language</a>
    </footer>

    <script src="js/cipher.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
