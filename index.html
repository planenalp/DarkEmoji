<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarkEmoji</title>
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
    <script>
        // 立即设置主题，避免闪烁
        document.documentElement.setAttribute('data-theme',
            localStorage.getItem('theme') === 'light' ? 'light' : 'dark' // Default to dark if not 'light'
        );
    </script>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <h1 class="title">DarkEmoji</h1>
    <div class="subtitle-container">
        <span class="subtitle" id="cipherSubtitle">Default</span>
        <div class="dropdown-menu" id="cipherMenu">
            <!-- Mode Switch: Default/Custom -->
            <div class="menu-mode-switch">
                <button class="mode-btn mode-btn-menu" id="defaultBtn">Default</button>
                <button class="mode-btn mode-btn-menu" id="customBtn">Custom</button>
            </div>
            <!-- Encrypt Options -->
            <div class="menu-options-row" id="encryptOptions">
                <button class="mode-btn mode-btn-menu menu-item" data-encrypt="AES-256-GCM">AES-256-GCM</button>
                <button class="mode-btn mode-btn-menu menu-item" data-encrypt="ChaCha20-Poly1305">ChaCha20-Poly1305</button>
            </div>
            <!-- Encode Options -->
            <div class="menu-options-row" id="encodeOptions">
                <button class="mode-btn mode-btn-menu menu-item" data-encode="Base64">Base64</button>
                <button class="mode-btn mode-btn-menu menu-item" data-encode="Base128">Base128</button>
                <button class="mode-btn mode-btn-menu menu-item" data-encode="Base256">Base256</button>
                <button class="mode-btn mode-btn-menu menu-item" data-encode="Base512">Base512</button>
                <button class="mode-btn mode-btn-menu menu-item" data-encode="Base1024">Base1024</button>
            </div>
        </div>
    </div>
    <div class="container">
        <div class="mode-switch">
            <button id="encryptBtn" class="mode-btn active">
                <span>🔒</span>
            </button>
            <button id="decryptBtn" class="mode-btn">
                <span>🔓</span>
            </button>
        </div>

        <div class="input-section">
            <textarea id="inputText" placeholder="Input"></textarea>
            <div class="button-group">
                <button class="action-btn" id="inputExpand">
                    <span class="btn-text default">Expand</span>
                    <span class="btn-text success">Collapse</span>
                </button>
                <button class="action-btn" id="inputPaste">
                    <span class="btn-text default">Paste</span>
                    <span class="btn-text success">Pasted</span>
                </button>
                <button class="action-btn" id="inputClear">
                    <span class="btn-text default">Clear</span>
                    <span class="btn-text success">Cleared</span>
                    <span class="btn-text query">?????</span>
                </button>
                <div class="file-drop-area" id="fileDropArea">
                    <span class="file-msg">Select or Drop</span>
                    <input type="file" id="fileInput" class="file-input">
                </div>
            </div>
        </div>

        <div class="password-section">
            <input type="password" id="password" placeholder="Password (optional)">
            <div class="button-group">
                <button class="action-btn" id="passwordCopy">
                    <span class="btn-text default">Copy</span>
                    <span class="btn-text success">Copied</span>
                </button>
                <button class="action-btn" id="passwordPaste">
                    <span class="btn-text default">Paste</span>
                    <span class="btn-text success">Pasted</span>
                </button>
                <button class="action-btn" id="passwordClear">
                    <span class="btn-text default">Clear</span>
                    <span class="btn-text success">Cleared</span>
                    <span class="btn-text query">?????</span>
                </button>
                <button class="action-btn" id="passwordGenerate">
                    <span class="btn-text default">Generate</span>
                    <span class="btn-text success">Generated</span>
                </button>
            </div>
        </div>

        <div class="output-section">
            <textarea id="outputText" placeholder="Output" readonly></textarea>
            <div class="button-group">
                <button class="action-btn" id="outputExpand">
                    <span class="btn-text default">Expand</span>
                    <span class="btn-text success">Collapse</span>
                </button>
                <button class="action-btn" id="outputCopy">
                    <span class="btn-text default">Copy</span>
                    <span class="btn-text success">Copied</span>
                </button>
                <button class="action-btn" id="outputClear">
                    <span class="btn-text default">Clear</span>
                    <span class="btn-text success">Cleared</span>
                    <span class="btn-text query">?????</span>
                </button>
                <div class="file-drop-area" id="saveFileArea">
                    <span class="file-msg">Save as...</span>
                    <input type="file" id="saveFileInput" class="file-input" style="display: none;">
                </div>
            </div>
        </div>

        <button id="actionBtn" class="main-btn"><span>🔒</span></button>
    </div>

    <script src="js/cipher.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
